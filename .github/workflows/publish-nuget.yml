name: Publish NuGet Packages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore LP.Common.sln

      - name: Build solution
        run: dotnet build LP.Common.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test LP.Common.sln --configuration Release --no-build --verbosity normal

      - name: Pack NuGet packages
        run: dotnet pack LP.Common.sln --configuration Release --no-build --output ./nupkgs -p:PackageVersion=1.0.${{ github.run_number }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" || true
          for package in ./nupkgs/*.nupkg; do
            if [ -f "$package" ]; then
              echo "Publishing $package"
              dotnet nuget push "$package" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
            fi
          done
